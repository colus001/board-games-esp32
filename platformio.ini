; Starter project for the Sunton ESP32-4848S040C (480x480 capacitive CYD).
;
; First milestone: show a chessboard and verify GT911 touch by selecting
; and moving pieces on the board.

[platformio]
default_envs = esp32-4848S040CIY1

[env:esp32-4848S040CIY1]
; Pin to an older platform because some smartdisplay panel drivers still use
; esp_lcd_panel_disp_off, renamed in newer ESP-IDF releases.
platform = espressif32@6.5.0
board = esp32-4848S040CIY1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_upload.use_1200bps_touch = false
monitor_filters = esp32_exception_decoder

build_flags =
    -Ofast
    -Wall
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    '-D LV_CONF_PATH="${platformio.include_dir}/lv_conf.h"'
    -DSMARTDISPLAY_DMA_BUFFER_SIZE=65536

lib_deps =
    https://github.com/rzeldent/esp32-smartdisplay

name = "local-chess-pairing"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Set these before deploy:
# wrangler secret put LICHESS_CLIENT_ID
# Optional, only if your Lichess OAuth app has a secret:
# wrangler secret put LICHESS_CLIENT_SECRET
# wrangler kv namespace create PAIRINGS
# wrangler deploy --var PUBLIC_BASE_URL:https://your-worker.example.com

[[kv_namespaces]]
binding = "PAIRINGS"
id = "replace-with-kv-namespace-id"

[vars]
PUBLIC_BASE_URL = "https://replace-with-your-worker-url"
